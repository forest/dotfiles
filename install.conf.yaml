- defaults:
    link:
      relink: true
    brewfile:
      stdout: true
      stderr: true
      include: ["tap", "brew", "cask", "mas"]
      sudo: brewuser

- clean: ["~"]

- shell:
    - [git submodule update --init --recursive]

- link:
    ~/.agents/research.md: agents/research.md
    ~/.agents/debugging.md: agents/debugging.md
    ~/.agents/design.md: agents/design.md
    ~/.agents/rules.md: agents/rules.md
    ~/.agents/testing.md: agents/testing.md
    ~/.agents/RTK.md: agents/RTK.md
    ~/.agents/skills: agents/skills
    ~/.claude/CLAUDE.md: agents/AGENTS.md
    ~/.claude/agents: claude/agents
    ~/.claude/skills: agents/skills
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/statusline-command.sh: claude/statusline-command.sh
    ~/.codex/AGENTS.md: agents/AGENTS.md
    ~/.codex/skills: codex/skills
    ~/.codex/config.toml: codex/config.toml
    ~/.codex/hooks.json: codex/hooks.json
    ~/.config/aliases.zsh: zsh/aliases.zsh
    ~/.config/direnv: direnv
    ~/.config/lazygit/config.yml:
      create: true
      path: git/lazygit.yml
    ~/.config/mise: mise
    ~/.config/ohmyzsh: ohmyzsh
    ~/.config/opencode/AGENTS.md:
      create: true
      path: agents/AGENTS.md
    ~/.config/opencode/opencode.json: opencode/opencode.json
    ~/.config/starship.toml: starship.toml
    ~/.config/worktrunk: worktrunk
    ~/.config/zed: zed
    ~/.config/scribe: scribe
    ~/.ctags: ctags
    ~/.gemrc: gemrc
    ~/.gitconfig: git/gitconfig
    ~/.gitignore: git/gitignore
    ~/.iex.exs: iex.exs
    ~/.livebookdesktop.sh: livebookdesktop.sh
    ~/.psqlrc: psqlrc
    ~/.ssh/config: ssh/config
    ~/.tmux.conf: tmux.conf
    ~/.warp: warp
    ~/.zprofile: zsh/.zprofile
    ~/.zshenv: zsh/.zshenv
    ~/.zshrc: zsh/.zshrc
    ~/.hammerspoon:
      if: "[ `uname` = Darwin ]"
      path: hammerspoon

- shell:
    - ["cd ~/dotfiles && brew bundle"]
