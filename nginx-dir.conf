daemon off;

events {
  worker_connections  1024;
}

http {
  include /usr/local/nginx/conf/mime.types;
  
  # Assuming path has been set to a Rails application
  access_log            log/nginx.access.log;
  
  client_body_temp_path tmp/nginx.client_body_temp;
  fastcgi_temp_path     tmp/nginx.client_body_temp;
  proxy_temp_path       tmp/nginx.proxy_temp;
  
  passenger_root /Users/forest/.rvm/gems/ruby-1.9.2-p0@global/gems/passenger-2.2.15;
  passenger_ruby /Users/forest/.rvm/rubies/ruby-1.9.2-p0/bin/ruby;
  
  server {
    listen      3000;
    server_name localhost;
    
    root              public;
    passenger_enabled on;
    #rails_env         development;
    rack_env          development;
  }

  server {
    listen      3001;
    server_name localhost;
    
    root              .;
    # passenger_enabled on;
    #rails_env         development;
    # rack_env          development;
  }

}
